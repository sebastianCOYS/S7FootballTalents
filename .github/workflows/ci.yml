name: CI

on:
  push:
  pull_request:

jobs:
  app:
    name: Build frontend & check backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://sebastian7.org/s7api

      - name: Check backend syntax
        run: find backend -name "*.js" -print0 | xargs -0 -n1 node --check